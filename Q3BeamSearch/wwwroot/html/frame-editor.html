<div class="timeline-editor">
    <div class="controls">
        <button id="play">▶️ Play</button>
        <button id="pause">⏸️ Pause</button>
        <button id="step-back">⏮️</button>
        <button id="step-forward">⏭️</button>
        <span id="frame-counter">Frame: 0 / 0</span>
    </div>

    <div class="timeline" id="timeline">
        <!-- Frames will be rendered here -->
    </div>

    <div class="frame-editor">
        <h3>Frame <span id="current-frame">0</span></h3>
        <label>Forward: <input type="range" id="forward" min="-127" max="127" value="0"></label>
        <label>Strafe: <input type="range" id="strafe" min="-127" max="127" value="0"></label>
        <label>Jump: <input type="checkbox" id="jump"></label>
        <label>Yaw: <input type="number" id="yaw" step="0.1"></label>
        <button id="apply-frame">Apply to Frame</button>
        <button id="insert-frame">Insert New Frame</button>
    </div>

    <div class="viewer-canvas">
        <canvas id="viewer3d" width="1280" height="720"></canvas>
    </div>

    <div class="stats">
        <h3>Physics State</h3>
        <div id="position">Position: 0, 0, 0</div>
        <div id="velocity">Velocity: 0, 0, 0</div>
        <div id="speed">Speed: 0 ups</div>
        <div id="ground">On Ground: false</div>
    </div>
</div>
